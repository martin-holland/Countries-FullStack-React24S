steps:
  # Debug step to print build-time substitution variables
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "===== DEBUG: SUBSTITUTION VARIABLES ====="
        echo "SUPABASE_URL: ${_SUPABASE_URL}"
        echo "SUPABASE_ANON_KEY: ${_SUPABASE_ANON_KEY}"
        echo "VITE_SUPABASE_URL: ${_VITE_SUPABASE_URL}"
        echo "VITE_SUPABASE_ANON_KEY: ${_VITE_SUPABASE_ANON_KEY}"
        echo "VITE_OPENWEATHER_API_KEY: ${_VITE_OPENWEATHER_API_KEY}"
        echo "============================================"
    id: "Debug-Substitutions"

  # 1. Enable Docker BuildKit for potential build speed improvements & better secret handling (optional but recommended)
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      [
        "-c",
        'echo "export DOCKER_BUILDKIT=1" >> /workspace/.env && cat /workspace/.env',
      ]
    id: "Enable BuildKit"

  # 2. Build the container image using the Dockerfile in the root
  #    Pass build-time environment variables needed by the frontend (Vite)
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--tag"
      # Use Artifact Registry (preferred over GCR). Replace REGION and YOUR_REPO_NAME.
      - "${_ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/countries-app:$COMMIT_SHA"
      - "--tag"
      - "${_ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/countries-app:latest"
      # Pass frontend build-time variables as build arguments
      # IMPORTANT: Ensure these are prefixed with VITE_ in your frontend code (e.g., import.meta.env.VITE_SUPABASE_URL)
      - "--build-arg"
      - "VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}"
      - "--build-arg"
      # Use the ANON key for the frontend build
      - "VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}"
      - "--build-arg"
      - "VITE_OPENWEATHER_API_KEY=${_VITE_OPENWEATHER_API_KEY}"
      - "." # Build context is the root directory
    id: "Build Image"
    env:
      # Make build-time vars available to the build process (read by Dockerfile ARG, then ENV)
      - "VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}"
      - "VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}"
      - "VITE_OPENWEATHER_API_KEY=${_VITE_OPENWEATHER_API_KEY}"

  # 3. Push the container image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/countries-app:$COMMIT_SHA",
      ]
    id: "Push Specific Tag"

  # Push the 'latest' tag as well
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/countries-app:latest",
      ]
    id: "Push Latest Tag"

  # Debug step before Cloud Run deployment
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "===== DEBUG: CLOUD RUN DEPLOYMENT VARIABLES ====="
        echo "NODE_ENV: production"
        echo "SUPABASE_URL: ${_SUPABASE_URL}"
        echo "SUPABASE_ANON_KEY: ${_SUPABASE_ANON_KEY}"
        echo "CLOUD_RUN_REGION: ${_CLOUD_RUN_REGION}"
        echo "ARTIFACT_REGISTRY: ${_ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/countries-app:$COMMIT_SHA"
        echo "==================================================="
    id: "Debug-Deployment-Vars"

  # 4. Deploy container image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "countries-fullstack-react24s" # Your Cloud Run service name - CHANGED FROM countries-app
      - "--image"
      # Deploy the specific commit SHA image
      - "${_ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/countries-app:$COMMIT_SHA"
      - "--region"
      # Specify the region for your Cloud Run service
      - "${_CLOUD_RUN_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated" # Consider changing to --no-allow-unauthenticated and setting up IAM/IAP for production
      # Set runtime environment variables for the NestJS backend
      # Use secrets from Secret Manager via substitutions for sensitive values
      - "--set-env-vars"
      - "NODE_ENV=production,SUPABASE_URL=${_SUPABASE_URL},SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY},OPENWEATHER_API_KEY=${_VITE_OPENWEATHER_API_KEY}"
    id: "Deploy to Cloud Run"

  # Debug step to print container logs after deployment
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "===== DEBUG: CHECKING DEPLOYMENT STATUS ====="
        echo "Waiting for service to be fully deployed..."
        sleep 30
        gcloud run services describe countries-fullstack-react24s --region=${_CLOUD_RUN_REGION} --format="value(status.url)" || echo "Service not yet available"
        echo "============================================="
    id: "Debug-Deployment-Status"

# Store images in Artifact Registry
images:
  - "${_ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/countries-app:$COMMIT_SHA"
  - "${_ARTIFACT_REGISTRY_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/countries-app:latest"

# Define substitutions - these will be provided by your Cloud Build Trigger
